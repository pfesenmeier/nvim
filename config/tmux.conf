# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:Tc"

# Use nushell as default shell
run-shell 'tmux set-option -g default-shell "$(which nu)"'

# Don't let tmux overwrite the Windows Terminal tab title
set -g set-titles off

# Enable mouse support (scrolling, pane selection)
set -g mouse on

# Start windows and panes at index 1
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# No escape delay
set -sg escape-time 0

# Widen status-left so session name isn't truncated
set -g status-left-length 30

# Pass escape sequences (including bell) through to the outer terminal
set -g allow-passthrough on

# Show bell flag but don't change tab background color
setw -g window-status-bell-style fg=default,bg=default

# Everforest green status bar (default; overridden per-session by
# tmux-session-style.nu, which picks an Everforest accent from a hash of the
# session name)
set -g status-style "bg=#A7C080,fg=#2D353B"
set-hook -g session-created 'run-shell "nu ~/nvim/nushell/lib/misc/tmux-session-style.nu"'
set-hook -g client-session-changed 'run-shell "nu ~/nvim/nushell/lib/misc/tmux-session-style.nu"'
run-shell "nu ~/nvim/nushell/lib/misc/tmux-session-style.nu"

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Splits and new windows inherit the current pane's cwd
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Sesh — fuzzy session/folder picker
bind f display-popup -E -w 80% -h 70% "sh -c 'sesh connect \"\$(sesh list -i | fzf --ansi)\"'"
bind L run-shell "sesh last"


# Quality of life
set -g history-limit 50000
set -g focus-events on
set -g set-clipboard on
# Closing the last window of a session jumps to another session instead of
# detaching — keeps session-per-folder browsing fluid.
set -g detach-on-destroy off

# Status bar polish (Everforest)
set -g status-interval 5
set -g status-left "#[bold] #S "
setw -g window-status-current-format "#[bold,reverse] #I:#W "
setw -g window-status-format " #I:#W#{?window_bell_flag,!,} "

# Pane borders (Everforest grey0 / green)
set -g pane-border-style "fg=#475258"
set -g pane-active-border-style "fg=#A7C080"

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'

# Auto-install TPM and listed plugins on first run (self-healing on a fresh
# machine — open tmux, plugins clone themselves, no external bootstrap step).
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# TPM bootstrap — keep at the very bottom of this file
run '~/.tmux/plugins/tpm/tpm'
