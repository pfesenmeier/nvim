# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:Tc"

# Use nushell as default shell
set -g default-shell /home/linuxbrew/.linuxbrew/bin/nu

# Enable mouse support (scrolling, pane selection)
set -g mouse on

# Start windows and panes at index 1
set -g base-index 1
setw -g pane-base-index 1

# Pass escape sequences (including bell) through to the outer terminal
set -g allow-passthrough on

# Show bell flag but don't change tab background color
setw -g window-status-bell-style fg=default,bg=default

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded"
