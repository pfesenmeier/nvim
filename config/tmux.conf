# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:Tc"

# Use nushell as default shell
run-shell 'tmux set-option -g default-shell "$(which nu)"'

# Don't let tmux overwrite the Windows Terminal tab title
set -g set-titles off

# Enable mouse support (scrolling, pane selection)
set -g mouse on

# Start windows and panes at index 1
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# No escape delay
set -sg escape-time 0

# Widen status-left so session name isn't truncated
set -g status-left-length 30

# Pass escape sequences (including bell) through to the outer terminal
set -g allow-passthrough on

# Show bell flag but don't change tab background color
setw -g window-status-bell-style fg=default,bg=default

# Everforest green status bar
set -g status-style "bg=#A7C080,fg=#2D353B"

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded"
